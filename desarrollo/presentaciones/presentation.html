<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATOM X Design Presentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060606;
      --bg-soft: #101010;
      --panel: rgba(17, 17, 17, 0.8);
      --panel-strong: rgba(20, 20, 20, 0.96);
      --line: rgba(255, 255, 255, 0.1);
      --text: #f5f1ea;
      --muted: #a89f92;
      --accent: #ff5a1f;
      --accent-soft: rgba(255, 90, 31, 0.14);
      --gold: #ffc857;
      --green: #42d392;
      --red: #ff7c66;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      --radius: 28px;
      --radius-sm: 18px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 15% 15%, rgba(255, 90, 31, 0.22), transparent 20%),
        radial-gradient(circle at 80% 0%, rgba(255, 200, 87, 0.1), transparent 24%),
        radial-gradient(circle at 85% 70%, rgba(66, 211, 146, 0.08), transparent 18%),
        linear-gradient(180deg, #050505 0%, #0b0b0b 48%, #070707 100%);
      color: var(--text);
      font-family: "Sora", sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at center, black 36%, transparent 100%);
      pointer-events: none;
      opacity: 0.35;
    }

    .shell {
      width: min(1320px, calc(100% - 32px));
      margin: 0 auto;
      padding: 20px 0 80px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      position: sticky;
      top: 14px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(6, 6, 6, 0.72);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .brand { display: flex; gap: 14px; align-items: center; }

    .atom {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid rgba(255, 90, 31, 0.35);
      background: radial-gradient(circle, rgba(255, 90, 31, 0.18), rgba(255, 90, 31, 0.04));
      box-shadow: inset 0 0 18px rgba(255, 90, 31, 0.16);
    }

    .atom-core {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 18px rgba(255, 90, 31, 0.85);
      position: relative;
    }

    .atom-core::before,
    .atom-core::after {
      content: "";
      position: absolute;
      inset: -8px;
      border: 1px solid rgba(255, 90, 31, 0.45);
      border-radius: 50%;
      animation: orbit 6s linear infinite;
    }

    .atom-core::after {
      inset: -10px -2px;
      transform: rotate(60deg);
      animation-direction: reverse;
    }

    @keyframes orbit { to { transform: rotate(360deg); } }

    .brand-copy strong,
    .section-kicker,
    .chip,
    .step-index,
    .mini-label,
    .nav-link,
    .pill {
      font-family: "Space Mono", monospace;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .brand-copy strong { display: block; font-size: 14px; color: var(--accent); }
    .brand-copy span { color: var(--muted); font-size: 12px; }

    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .nav-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: 0.2s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--text);
      border-color: rgba(255, 90, 31, 0.28);
      background: var(--accent-soft);
    }

    .hero {
      min-height: calc(100vh - 110px);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
      align-items: stretch;
      padding: 10px 0 28px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-main,
    .hero-side,
    .section-panel {
      padding: 30px;
      position: relative;
    }

    .hero-main::after {
      content: "";
      position: absolute;
      right: -90px;
      top: 10%;
      width: 250px;
      height: 250px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 90, 31, 0.25), transparent 68%);
      pointer-events: none;
    }

    .section-kicker { font-size: 12px; color: var(--accent); }
    h1 { font-size: clamp(44px, 7vw, 96px); line-height: 0.94; margin: 18px 0 16px; max-width: 8ch; }

    .lead {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
      max-width: 62ch;
      margin-bottom: 26px;
    }

    .hero-actions,
    .metric-strip,
    .chip-row,
    .slide-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 18px;
      border-radius: 16px;
      text-decoration: none;
      border: 1px solid transparent;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .button.primary { background: var(--accent); color: white; }
    .button.secondary { color: var(--text); border-color: var(--line); background: rgba(255, 255, 255, 0.03); }
    .button:hover { transform: translateY(-1px); }

    .metric-strip { margin-top: 26px; }
    .metric {
      flex: 1 1 180px;
      min-width: 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.03);
    }

    .metric strong { display: block; font-size: 34px; margin-bottom: 10px; }
    .metric span { color: var(--muted); font-size: 14px; line-height: 1.5; }

    .hero-side {
      background:
        linear-gradient(160deg, rgba(24, 24, 24, 0.94), rgba(13, 13, 13, 0.98)),
        radial-gradient(circle at top right, rgba(255, 90, 31, 0.22), transparent 34%);
      display: grid;
      gap: 18px;
    }

    .screen {
      padding: 22px;
      border-radius: 26px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
    }

    .screen-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 12px;
    }

    .mock-flow { display: grid; gap: 12px; }
    .flow-card {
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      transform: translateY(20px);
      opacity: 0;
      animation: riseIn 0.6s forwards;
    }

    .flow-card:nth-child(2) { animation-delay: 0.18s; }
    .flow-card:nth-child(3) { animation-delay: 0.36s; }
    .flow-card:nth-child(4) { animation-delay: 0.54s; }
    @keyframes riseIn { to { opacity: 1; transform: translateY(0); } }
    .flow-card strong { display: block; margin-bottom: 8px; font-size: 18px; }
    .flow-card p { margin: 0; color: var(--muted); line-height: 1.6; font-size: 14px; }

    .color-band {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .swatch {
      height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
    }

    .swatch::after {
      content: attr(data-label);
      position: absolute;
      inset: auto 8px 6px 8px;
      font-size: 9px;
      font-family: "Space Mono", monospace;
      color: rgba(255, 255, 255, 0.8);
      letter-spacing: 0.08em;
    }

    .hero-note {
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255, 200, 87, 0.08);
      border: 1px solid rgba(255, 200, 87, 0.2);
      color: #f5deb0;
      line-height: 1.6;
      font-size: 14px;
    }
  </style>
</head>
<body>
</body>
</html>
